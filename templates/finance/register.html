<!DOCTYPE html>
<html lang="ru" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>baqlau — Регистрация</title>
    {% load static %}

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .auth-card {
            background: var(--md-surface);
            border-radius: var(--radius-card-large);
            box-shadow: var(--shadow-card);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--md-secondary);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--md-on-surface-variant);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--md-outline);
            background: var(--md-surface-container);
            color: var(--md-on-surface);
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--md-secondary);
        }

        .helptext {
            display: block;
            font-size: 0.75rem;
            color: var(--md-on-surface-variant);
            margin-top: 4px;
        }

        ul {
            list-style: none;
        }
    </style>
</head>

<body class="main-content--centered">
    <div class="auth-card">
        <div class="navbar__logo" style="justify-content: center; margin-bottom: 24px;">
            🏦 <span>baqlau</span>
        </div>
        <h1 class="upload-title">Регистрация</h1>
        <p class="upload-subtitle">Начните контролировать свои финансы</p>

        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                    id="{{ field.id_for_label }}" class="form-control" required>
                {% if field.help_text %}
                <small class="helptext">{{ field.help_text|safe }}</small>
                {% endif %}
                {% if field.errors %}
                <div class="alert-error" style="margin-top: 8px; padding: 8px 12px;">
                    {{ field.errors.0 }}
                </div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn-tonal btn-tonal--primary-solid btn-tonal--w-100"
                style="background: var(--md-secondary);">
                Создать аккаунт
            </button>
        </form>

        <p style="margin-top: 24px; font-size: 0.9rem; color: var(--md-on-surface-variant);">
            Уже есть аккаунт? <a href="{% url 'login' %}" class="btn-link">Войти</a>
        </p>
    </div>

    <script>
        const root = document.documentElement;
        (function initTheme() {
            const saved = localStorage.getItem('baqlau-theme');
            if (saved) {
                root.setAttribute('data-theme', saved);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                root.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
            }
        })();
    </script>
</body>

</html>
