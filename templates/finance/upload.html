<!DOCTYPE html>
<html>
<head>
    <title>Загрузка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-light">
<div class="card p-5 shadow" style="width: 400px;">
    <h3 class="text-center mb-4">Загрузить документ</h3>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <input type="file" name="document" class="form-control" required accept=".pdf,.jpg,.jpeg,.png">
        </div>
        <button type="submit" class="btn btn-success w-100">Распознать (Gemini)</button>
    </form>
    <a href="{% url 'dashboard' %}" class="btn btn-link w-100 mt-2">Назад</a>
</div>
</body>
</html>
