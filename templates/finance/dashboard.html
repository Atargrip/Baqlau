<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Финансы AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>💰 Мои Финансы</h1>
        <div>
            <!-- Кнопка теперь внутри формы или привязана к ней.
                 Добавим id="export-btn" и атрибут disabled -->
            <button type="submit" form="export-form" id="export-btn" class="btn btn-success btn-lg me-2" disabled>
                📥 Экспорт выбранных
            </button>
            <a href="{% url 'upload' %}" class="btn btn-primary btn-lg">+ Добавить чек</a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <!-- Форма для отправки выбранных ID -->
            <form id="export-form" action="{% url 'export' %}" method="POST">
                {% csrf_token %}
                <table class="table table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th style="width: 40px;">
                            <input type="checkbox" id="select-all" class="form-check-input">
                        </th>
                        <th>Дата</th>
                        <th>Магазин/Описание</th>
                        <th>Сумма</th>
                        <th>Тип</th>
                    </tr>
                    </thead>
                    <tbody>
                    {% for t in transactions %}
                        <tr>
                            <td>
                                <!-- Чекбокс с ID транзакции -->
                                <input type="checkbox" name="transaction_ids" value="{{ t.id }}"
                                       class="form-check-input transaction-checkbox">
                            </td>
                            <td>{{ t.date|date:"d.m.Y" }}</td>
                            <td>{{ t.merchant }}</td>
                            <td class="fw-bold {% if t.transaction_type == 'expense' %}text-danger{% else %}text-success{% endif %}">
                                {% if t.transaction_type == 'expense' %}-{% else %}
                                    +{% endif %} {{ t.amount }} {{ t.currency }}
                            </td>
                            <td>{{ t.get_transaction_type_display }}</td>
                        </tr>
                    {% endfor %}
                    </tbody>
                </table>
            </form>
        </div>
    </div>
</div>
<script>
    const selectAll = document.getElementById('select-all');
    const checkboxes = document.querySelectorAll('.transaction-checkbox');
    const exportBtn = document.getElementById('export-btn');

    function updateButtonState() {
        // Проверяем, выбран ли хоть один чекбокс
        const checkedCount = document.querySelectorAll('.transaction-checkbox:checked').length;
        exportBtn.disabled = checkedCount === 0;

        // Обновляем текст кнопки для наглядности
        if (checkedCount > 0) {
            exportBtn.innerText = `📥 Экспорт (${checkedCount})`;
        } else {
            exportBtn.innerText = `📥 Экспорт выбранных`;
        }
    }

    // Логика "Выбрать все"
    selectAll.addEventListener('change', function() {
        checkboxes.forEach(cb => cb.checked = selectAll.checked);
        updateButtonState();
    });

    // Логика для каждого отдельного чекбокса
    checkboxes.forEach(cb => {
        cb.addEventListener('change', updateButtonState);
    });
</script>
</body>
</html>
